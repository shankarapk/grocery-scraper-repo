name: Grocery Price Scraper

on:
  workflow_dispatch:
    inputs:
      items:
        description: Items to search
        required: false
        default: tomato,onion,potato,rice,milk,eggs,oil,carrot

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium
      - name: Run
        run: python scraper.py "${{ github.event.inputs.items }}"
      - uses: actions/upload-artifact@v4
        with:
          name: grocery-prices
          path: output/
          retention-days: 7